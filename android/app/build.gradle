plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    // id "com.google.gms.google-services"
    // id "com.google.firebase.crashlytics"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.hicar.ora.limited"
    compileSdk flutter.compileSdkVersion
    // ndkVersion "29.0.13846066"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        // coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }


    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.hicar.ora.limited"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        ndk {
            // arm64-v8a: thiết bị 64-bit hiện đại (bắt buộc cho Play).
            // armeabi-v7a: nhiều Android Box / màn hình xe đời cũ là 32-bit ARM.
            // (Bỏ x86_64 vì gần như chỉ dùng cho emulator, không cần cho thiết bị thật.)
            abiFilters "arm64-v8a", "armeabi-v7a"
        }
    }

    signingConfigs {
       release {
           keyAlias keystoreProperties['keyAlias']
           keyPassword keystoreProperties['keyPassword']
           storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
           storePassword keystoreProperties['storePassword']
        }
    }
    buildTypes {
        release {
            // signingConfig signingConfigs.debug
            signingConfig signingConfigs.release
            // 🟢 Bật R8 để rút gọn code + tài nguyên, giảm dung lượng app.
            //    Các lớp native/plugin/entry-point đã được giữ trong proguard-rules.pro.
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "androidx.media:media:1.6.0"
    implementation "androidx.core:core-ktx:1.12.0"
}

def overlayPluginJavaDir = file("${System.getenv('PUB_CACHE') ?: "${System.getProperty('user.home')}/AppData/Local/Pub/Cache/hosted/pub.dev"}/flutter_overlay_window-0.5.0/android/src/main/java/flutter/overlay/window/flutter_overlay_window")
def overlayPatchFile = file("${rootProject.projectDir}/overlay_patches/flutter/overlay/window/flutter_overlay_window/OverlayService.java")

tasks.register("applyOverlayPatch") {
    doLast {
        if (!overlayPatchFile.exists()) {
            println("HiCar: OverlayService patch not found, skip")
            return
        }
        overlayPluginJavaDir.mkdirs()
        def dest = new File(overlayPluginJavaDir, "OverlayService.java")
        ant.copy(file: overlayPatchFile, tofile: dest, overwrite: true)
        println("HiCar: applied OverlayService patch → ${dest}")
    }
}

tasks.named("preBuild").configure { dependsOn("applyOverlayPatch") }
